services:
  migrate:
    build:
      context: .
      target: migration
    environment:
      DATABASE_URL: file:./data/demo.db
      DEMO_MODE: "true"
      UPLOAD_DIR: /app/server/storage/payment-proofs
    command:
      - sh
      - -c
      - npm run db:bootstrap:demo && chown -R 1000:1000 /app/server/prisma/data /app/server/storage/payment-proofs
    volumes:
      - sqlite-data:/app/server/prisma/data
      - payment-proofs:/app/server/storage/payment-proofs
    restart: "no"

  api:
    build:
      context: .
      target: api
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: file:./data/demo.db
      APP_BASE_URL: http://localhost:8080
      API_BASE_URL: http://localhost:8080
      CLIENT_ORIGIN: http://localhost:8080
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET to a random value with at least 32 characters}
      # The one-shot seed job installs fictional records; the long-running
      # production-mode API still keeps demo-only response behavior disabled.
      DEMO_MODE: "false"
      SAFEPAY_DEMO_MODE: "false"
      EMAIL_PROVIDER: disabled
      UPLOAD_DIR: /app/server/storage/payment-proofs
    depends_on:
      migrate:
        condition: service_completed_successfully
    volumes:
      - sqlite-data:/app/server/prisma/data
      - payment-proofs:/app/server/storage/payment-proofs
    restart: unless-stopped

  web:
    build:
      context: .
      target: web
      args:
        VITE_API_BASE_URL: /api
        VITE_SHOW_DEMO_ACCOUNTS: "false"
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "8080:8080"
    restart: unless-stopped

volumes:
  sqlite-data:
  payment-proofs:
